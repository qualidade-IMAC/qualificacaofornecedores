            X: ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,

            Info: ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            ArrowLeft: ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,

            Grid: ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="7" x="3" y="3" rx="1.5"/><rect width="7" height="7" x="14" y="3" rx="1.5"/><rect width="7" height="7" x="14" y="14" rx="1.5"/><rect width="7" height="7" x="3" y="14" rx="1.5"/></svg>,
            Menu: ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
        };

        // Sugestões de documentos comuns (atalho de preenchimento). Cada fornecedor define livremente
        // sua própria lista de documentos — não é obrigatório usar nenhum item daqui.
        const DOCUMENT_TYPES = [
            { id: 'alvara_func', name: 'Alvará de Funcionamento', frequency: 'Anual', legislation: 'Municipal' },
            { id: 'licenca_san', name: 'Licença Sanitária', frequency: 'Anual', legislation: 'RDC 275/2002' },
            { id: 'agua_fq', name: 'Análise Físico-Química da Água', frequency: 'Semestral', legislation: 'Portaria GM/MS 888' },
            { id: 'agua_micro', name: 'Análise Microbiológica da Água', frequency: 'Mensal', legislation: 'Portaria GM/MS 888' },
            { id: 'pragas', name: 'Certificado Controle de Pragas', frequency: 'Mensal/Trimestral', legislation: 'RDC 216/2004' },
            { id: 'sif_sie', name: 'Registro do Selo de Inspeção (SIF/SIE)', frequency: 'Vigência do Registro', legislation: 'RIISPOA' },
            { id: 'ficha', name: 'Ficha Técnica do Produto', frequency: 'Único (atualizar se mudar)', legislation: 'RDC 259/2002' },
            { id: 'laudo', name: 'Laudo de Análise do Produto', frequency: 'Por Lote', legislation: 'Controle de Qualidade' }
        ];

        const STATUS_OPTIONS = ['Qualificado', 'Pendente', 'Em Análise', 'Bloqueado'];
        const MAX_FILE_MB = 8;

        // Seed de dados iniciais caso a coleção do Firebase esteja vazia
        const INITIAL_SUPPLIERS = [
            {
                id: "1", name: "GRANDE MOINHO CEARENSE S A", status: "Qualificado", insumos: ["Farinha de Trigo Especial", "Mistura para Bolo"],
                documents: []
            },
            {
                id: "2", name: "NESTLE BRASIL LTDA", status: "Pendente", insumos: ["Cacau em Pó", "Leite Condensado"],
                documents: []
            },
            {
                id: "3", name: "BRF S.A.", status: "Em Análise", insumos: ["Peito de Frango Desfiado", "Margarina Folhada"],
                documents: []
            }
        ];

        const fmtDate = (d) => {
            if (!d) return '-';
            const parts = d.split('-');
            if (parts.length !== 3) return d;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        };

        const normInsumo = (s) => (s || '').trim().toUpperCase();

        const docDisplayName = (d) => {
            if (d.name) return d.name;
            const known = DOCUMENT_TYPES.find(t => t.id === d.type);
            return known ? known.name : (d.type || 'Documento');
        };

        const docStatusFor = (expiryDate) => {
            if (!expiryDate) return 'valid';
            const diffDays = Math.ceil((new Date(expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
            if (diffDays < 0) return 'expired';
            if (diffDays < 30) return 'warning';
            return 'valid';
        };

        const StatusBadge = ({ status }) => {
            const styles = {
                'Qualificado': 'bg-green-100 text-green-800 border-green-200',
                'Pendente': 'bg-yellow-100 text-yellow-800 border-yellow-200',
                'Em Análise': 'bg-blue-100 text-blue-800 border-blue-200',
                'Bloqueado': 'bg-red-100 text-red-800 border-red-200',
                'valid': 'bg-green-50 text-green-700 border-green-200',
                'expired': 'bg-red-50 text-red-700 border-red-200',
                'warning': 'bg-orange-50 text-orange-700 border-orange-200',
                'missing': 'bg-gray-100 text-gray-500 border-gray-200 border-dashed'
            };
            const labels = { 'valid': 'Vigente', 'expired': 'Vencido', 'warning': 'Vence < 30 dias', 'missing': 'Pendente' };
            return <span className={`px-2 py-1 rounded-full text-xs font-medium border whitespace-nowrap ${styles[status] || 'bg-gray-100 text-gray-800'}`}>{labels[status] || status}</span>;
        };

        const Card = ({ title, value, subtext, icon: Icon, colorClass, onClick }) => (
            <div
                onClick={onClick}
                className={`bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-start justify-between transition-all ${onClick ? 'cursor-pointer hover:shadow-md active:scale-95' : ''}`}
            >
                <div>
                    <p className="text-sm font-medium text-slate-500 mb-1">{title}</p>
                    <h3 className="text-2xl font-bold text-slate-800">{value}</h3>
                    {subtext && <p className="text-xs text-slate-400 mt-1">{subtext}</p>}
                </div>
                <div className={`p-3 rounded-lg ${colorClass}`}><Icon size={24} /></div>
            </div>
        );

        const Modal = ({ title, onClose, children, wide }) => (
            <div className="fixed inset-0 bg-black/40 z-40 flex items-end sm:items-center justify-center animate-in" onClick={onClose}>
                <div
                    className={`bg-white w-full ${wide ? 'sm:max-w-2xl' : 'sm:max-w-md'} sm:rounded-2xl rounded-t-2xl max-h-[90vh] overflow-y-auto animate-slide-up`}
                    onClick={e => e.stopPropagation()}
                >
                    <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100 sticky top-0 bg-white z-10">
                        <h3 className="font-bold text-lg text-slate-800">{title}</h3>
                        <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400"><Icons.X size={20} /></button>
                    </div>
                    <div className="p-5">{children}</div>
                </div>
            </div>
        );

        function App() {
            // States principais alimentados online pelo Firebase
            const [suppliers, setSuppliers] = useState([]);
            const [selectedSupplierId, setSelectedSupplierId] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [view, setView] = useState('dashboard'); // dashboard, list, detail, insumos, insumoDetail
            const [isImporting, setIsImporting] = useState(false);
            const [listFilter, setListFilter] = useState('all');

            // Insumos e Fornecedores States
            const [insumosList, setInsumosList] = useState([]); // coleção própria "insumos" no Firestore
            const [searchInsumo, setSearchInsumo] = useState("");
            const [selectedInsumoId, setSelectedInsumoId] = useState(null);
            const [newInsumo, setNewInsumo] = useState('');
            const [isAddSupplierOpen, setIsAddSupplierOpen] = useState(false);
            const [newSupplierName, setNewSupplierName] = useState('');
            const [isAddInsumoOpen, setIsAddInsumoOpen] = useState(false);
            const [newInsumoNameTop, setNewInsumoNameTop] = useState('');
            const [isEditInsumoOpen, setIsEditInsumoOpen] = useState(false);
            const [editingInsumo, setEditingInsumo] = useState(null);

            // Layout (sidebar)
            const [sidebarOpen, setSidebarOpen] = useState(false);

            // Branding State sincronizado online
            const [brandColor, setBrandColor] = useState('#1e40af');
            const [logoUrl, setLogoUrl] = useState(null);
            const [showSettings, setShowSettings] = useState(false);

            // Modals e Toasts
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [docForm, setDocForm] = useState({ id: null, name: '', note: '', expiryDate: '', fileURL: null, filePath: null, fileName: '', uploading: false, uploadProgress: 0 });
            const [toastInfo, setToastInfo] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [viewDocUrl, setViewDocUrl] = useState(null);
            const fileInputRef = useRef(null);

            const selectedSupplier = useMemo(
                () => suppliers.find(s => String(s.id) === String(selectedSupplierId)) || null,
                [suppliers, selectedSupplierId]
            );

            // Sincronização em tempo real com o Firebase Firestore
            useEffect(() => {
                let unsubscribeSuppliers;
                let unsubscribeSettings;
                let unsubscribeInsumos;

                const checkFirebaseReady = setInterval(() => {
                    if (window.fb) {
                        clearInterval(checkFirebaseReady);

                        unsubscribeSuppliers = window.fb.onSnapshot(window.fb.collection(window.fb.db, "suppliers"), (snapshot) => {
                            if (snapshot.empty) {
                                INITIAL_SUPPLIERS.forEach(s => {
                                    window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", s.id), s);
                                });
                            } else {
                                const loaded = [];
                                snapshot.forEach(d => loaded.push({ ...d.data(), id: d.id }));
                                loaded.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                                setSuppliers(loaded);
                            }
                        });

                        unsubscribeInsumos = window.fb.onSnapshot(window.fb.collection(window.fb.db, "insumos"), (snapshot) => {
                            const loaded = [];
                            snapshot.forEach(d => loaded.push({ ...d.data(), id: d.id }));
                            loaded.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                            setInsumosList(loaded);
                        });

                        unsubscribeSettings = window.fb.onSnapshot(window.fb.doc(window.fb.db, "settings", "ui"), (docSnap) => {
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                if (data.brandColor) setBrandColor(data.brandColor);
                                if (data.logoUrl) setLogoUrl(data.logoUrl);
                            }
                        });
                    }
                }, 100);

                return () => {
                    clearInterval(checkFirebaseReady);
                    if (unsubscribeSuppliers) unsubscribeSuppliers();
                    if (unsubscribeSettings) unsubscribeSettings();
                    if (unsubscribeInsumos) unsubscribeInsumos();
                };
            }, []);

            // Mantém a coleção de insumos sincronizada: qualquer insumo digitado direto num
            // fornecedor que ainda não exista na coleção "insumos" é registrado automaticamente
            const inFlightInsumoCreates = useRef(new Set());
            useEffect(() => {
                const known = new Set(insumosList.map(i => normInsumo(i.name)));
                suppliers.forEach(s => (s.insumos || []).forEach(name => {
                    const n = normInsumo(name);
                    if (n && !known.has(n) && !inFlightInsumoCreates.current.has(n)) {
                        inFlightInsumoCreates.current.add(n);
                        const ref = window.fb.doc(window.fb.collection(window.fb.db, "insumos"));
                        window.fb.setDoc(ref, { name: name.trim() })
                            .finally(() => inFlightInsumoCreates.current.delete(n));
                    }
                }));
            }, [suppliers, insumosList]);

            const stats = useMemo(() => {
                const total = suppliers.length;
                const qualified = suppliers.filter(s => s.status === 'Qualificado').length;
                let expiredDocs = 0, warningDocs = 0;
                suppliers.forEach(s => (s.documents || []).forEach(d => {
                    const st = docStatusFor(d.expiryDate);
                    if (st === 'expired') expiredDocs++;
                    if (st === 'warning') warningDocs++;
                }));
                const pendingReview = suppliers.filter(s => s.status === 'Pendente' || s.status === 'Em Análise').length;
                return { total, qualified, expiredDocs, warningDocs, pendingReview };
            }, [suppliers]);

            const urgentItems = useMemo(() => {
                const items = [];
                suppliers.forEach(s => (s.documents || []).forEach(d => {
                    const st = docStatusFor(d.expiryDate);
                    if (st === 'expired' || st === 'warning') {
                        items.push({ supplierId: s.id, supplierName: s.name, docName: docDisplayName(d), expiryDate: d.expiryDate, status: st });
                    }
                }));
                return items.sort((a, b) => (a.expiryDate || '').localeCompare(b.expiryDate || ''));
            }, [suppliers]);

            const filteredSuppliers = useMemo(() => {
                return suppliers.filter(s => {
                    const matchesSearch = s.name && s.name.toLowerCase().includes(searchTerm.toLowerCase());
                    let matchesFilter = true;
                    if (listFilter === 'expired') matchesFilter = (s.documents || []).some(d => docStatusFor(d.expiryDate) === 'expired');
                    else if (listFilter === 'pending') matchesFilter = s.status === 'Pendente' || s.status === 'Em Análise';
                    else if (listFilter === 'qualified') matchesFilter = s.status === 'Qualificado';
                    return matchesSearch && matchesFilter;
                });
            }, [suppliers, searchTerm, listFilter]);

            const insumosData = useMemo(() => {
                return insumosList.map(ins => {
                    const norm = normInsumo(ins.name);
                    const matchingSuppliers = suppliers.filter(s => (s.insumos || []).some(i => normInsumo(i) === norm));
                    return { id: ins.id, name: ins.name, suppliers: matchingSuppliers };
                }).sort((a, b) => a.name.localeCompare(b.name));
            }, [insumosList, suppliers]);

            const filteredInsumos = useMemo(() => {
                return insumosData.filter(i => i.name.toLowerCase().includes(searchInsumo.toLowerCase()));
            }, [insumosData, searchInsumo]);

            const selectedInsumoData = useMemo(() => {
                if (!selectedInsumoId) return null;
                return insumosData.find(i => i.id === selectedInsumoId) || null;
            }, [insumosData, selectedInsumoId]);

            const showToast = (message, type = 'info') => {
                setToastInfo({ message, type });
                setTimeout(() => setToastInfo(null), 3500);
            };

            const handleDashboardClick = (filterType) => {
                setListFilter(filterType);
                setView('list');
            };

            const goToSupplier = (id) => {
                setSelectedSupplierId(id);
                setView('detail');
            };

            // Criar Novo Fornecedor salvando direto no Firestore
            const handleSaveNewSupplier = () => {
                if (!newSupplierName.trim()) {
                    showToast("Por favor, digite o nome do fornecedor.", "error");
                    return;
                }
                const newId = String(Math.max(...suppliers.map(s => Number(s.id) || 0), 0) + 1);
                const newSup = { id: newId, name: newSupplierName.trim().toUpperCase(), status: "Pendente", insumos: [], documents: [] };

                window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", newId), newSup)
                    .then(() => {
                        setNewSupplierName("");
                        setIsAddSupplierOpen(false);
                        showToast("Fornecedor cadastrado com sucesso!", "success");
                        goToSupplier(newId);
                    })
                    .catch(() => showToast("Erro ao salvar no servidor.", "error"));
            };

            const handleChangeStatus = (newStatus) => {
                if (!selectedSupplier) return;
                window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", String(selectedSupplier.id)), { ...selectedSupplier, status: newStatus });
            };

            const confirmDeleteSupplier = () => {
                if (!selectedSupplier) return;
                setConfirmDialog({
                    message: `Excluir o fornecedor "${selectedSupplier.name}" e todos os seus documentos? Esta ação não pode ser desfeita.`,
                    onConfirm: async () => {
                        // Apaga os arquivos do Storage também
                        const docs = selectedSupplier.documents || [];
                        for (const d of docs) {
                            if (d.filePath) {
                                try { await window.fb.deleteObject(window.fb.ref(window.fb.storage, d.filePath)); } catch (e) {}
                            }
                        }
                        await window.fb.deleteDoc(window.fb.doc(window.fb.db, "suppliers", String(selectedSupplier.id)));
                        setConfirmDialog(null);
                        setView('list');
                        showToast("Fornecedor excluído.", "info");
                    }
                });
            };

            // Importação em Lote via Planilha com persistência no Firestore
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsImporting(true);
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
                        let currentId = Math.max(...suppliers.map(s => Number(s.id) || 0), 0) + 1;
                        let importedCount = 0;

                        for (const row of data) {
                            if (row.length > 6 && row[6] && typeof row[6] === 'string') {
                                const name = row[6].trim();
                                if (name !== 'FORNECEDORES' && name.length > 2) {
                                    if (!suppliers.some(s => s.name === name)) {
                                        const newIdStr = String(currentId++);
                                        const newSup = { id: newIdStr, name: name, status: "Pendente", insumos: [], documents: [] };
                                        await window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", newIdStr), newSup);
                                        importedCount++;
                                    }
                                }
                            }
                        }

                        if (importedCount > 0) showToast(`${importedCount} fornecedores importados e sincronizados!`, "success");
                        else showToast("Nenhum fornecedor novo encontrado.", "info");
                    } catch (error) {
                        showToast("Erro ao ler planilha.", "error");
                    } finally {
                        setIsImporting(false);
                        e.target.value = "";
                    }
                };
                reader.readAsBinaryString(file);
            };

            // Adicionar Insumo vinculado diretamente ao Firebase
            const handleAddInsumo = () => {
                if (!newInsumo.trim() || !selectedSupplier) return;
                const currentInsumos = selectedSupplier.insumos || [];
                if (currentInsumos.some(i => i.toLowerCase() === newInsumo.trim().toLowerCase())) {
                    showToast("Este insumo já está vinculado.", "error");
                    return;
                }
                const updatedSup = { ...selectedSupplier, insumos: [...currentInsumos, newInsumo.trim()] };
                window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", String(selectedSupplier.id)), updatedSup)
                    .then(() => setNewInsumo(''));
            };

            const handleRemoveInsumo = (insumoToRemove) => {
                if (!selectedSupplier) return;
                const currentInsumos = selectedSupplier.insumos || [];
                const updatedSup = { ...selectedSupplier, insumos: currentInsumos.filter(i => i !== insumoToRemove) };
                window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", String(selectedSupplier.id)), updatedSup);
            };

            // --- Gestão de Insumos (cadastro próprio, independente do fornecedor) ---

            const handleCreateInsumoTop = () => {
                if (!newInsumoNameTop.trim()) return;
                const norm = normInsumo(newInsumoNameTop);
                if (insumosList.some(i => normInsumo(i.name) === norm)) {
                    showToast("Esse insumo já está cadastrado.", "error");
                    return;
                }
                const ref = window.fb.doc(window.fb.collection(window.fb.db, "insumos"));
                window.fb.setDoc(ref, { name: newInsumoNameTop.trim() })
                    .then(() => {
                        setNewInsumoNameTop('');
                        setIsAddInsumoOpen(false);
                        showToast("Insumo cadastrado!", "success");
                    })
                    .catch(() => showToast("Erro ao cadastrar insumo.", "error"));
            };

            const openEditInsumo = (ins) => {
                setEditingInsumo({ id: ins.id, name: ins.name });
                setIsEditInsumoOpen(true);
            };

            const handleRenameInsumo = () => {
                if (!editingInsumo || !editingInsumo.name.trim()) return;
                const newName = editingInsumo.name.trim();
                const norm = normInsumo(newName);
                if (insumosList.some(i => i.id !== editingInsumo.id && normInsumo(i.name) === norm)) {
                    showToast("Já existe um insumo com esse nome.", "error");
                    return;
                }
                const oldIns = insumosList.find(i => i.id === editingInsumo.id);
                const oldNorm = oldIns ? normInsumo(oldIns.name) : null;

                window.fb.setDoc(window.fb.doc(window.fb.db, "insumos", editingInsumo.id), { name: newName }, { merge: true })
                    .then(async () => {
                        // Propaga o novo nome para todos os fornecedores que usam o nome antigo
                        const affected = suppliers.filter(s => (s.insumos || []).some(i => normInsumo(i) === oldNorm));
                        for (const s of affected) {
                            const updatedInsumos = (s.insumos || []).map(i => normInsumo(i) === oldNorm ? newName : i);
                            await window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", String(s.id)), { ...s, insumos: updatedInsumos });
                        }
                        setIsEditInsumoOpen(false);
                        setEditingInsumo(null);
                        showToast("Insumo atualizado em todos os fornecedores vinculados.", "success");
                    })
                    .catch(() => showToast("Erro ao renomear insumo.", "error"));
            };

            const confirmDeleteInsumoTop = (ins) => {
                const data = insumosData.find(i => i.id === ins.id);
                const count = data ? data.suppliers.length : 0;
                setConfirmDialog({
                    message: `Excluir o insumo "${ins.name}"?${count > 0 ? ` Ele será removido de ${count} fornecedor(es) vinculado(s).` : ''}`,
                    onConfirm: async () => {
                        const norm = normInsumo(ins.name);
                        const affected = suppliers.filter(s => (s.insumos || []).some(i => normInsumo(i) === norm));
                        for (const s of affected) {
                            const updatedInsumos = (s.insumos || []).filter(i => normInsumo(i) !== norm);
                            await window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", String(s.id)), { ...s, insumos: updatedInsumos });
                        }
                        await window.fb.deleteDoc(window.fb.doc(window.fb.db, "insumos", ins.id));
                        setConfirmDialog(null);
                        if (view === 'insumoDetail' && selectedInsumoId === ins.id) setView('insumos');
                        showToast("Insumo excluído.", "info");
                    }
                });
            };

            // Upload do arquivo PDF direto para o Firebase Storage (resolve o limite de 1MB do Firestore)
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file || !selectedSupplier) return;

                if (file.type !== 'application/pdf') {
                    showToast("Apenas arquivos PDF são aceitos.", "error");
                    e.target.value = "";
                    return;
                }
                if (file.size > MAX_FILE_MB * 1024 * 1024) {
                    showToast(`Arquivo muito grande! Limite máximo de ${MAX_FILE_MB} MB.`, "error");
                    e.target.value = "";
                    return;
                }

                setDocForm(prev => ({ ...prev, uploading: true, uploadProgress: 0, fileName: file.name }));

                const path = `documentos/${selectedSupplier.id}/${Date.now()}_${file.name}`;
                const storageRef = window.fb.ref(window.fb.storage, path);
                const uploadTask = window.fb.uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed',
                    (snapshot) => {
                        const progress = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                        setDocForm(prev => ({ ...prev, uploadProgress: progress }));
                    },
                    (error) => {
                        console.error("Erro no upload:", error);
                        showToast("Erro ao enviar o arquivo. Verifique sua conexão.", "error");
                        setDocForm(prev => ({ ...prev, uploading: false, uploadProgress: 0 }));
                    },
                    async () => {
                        const url = await window.fb.getDownloadURL(uploadTask.snapshot.ref);
                        setDocForm(prev => ({ ...prev, uploading: false, uploadProgress: 100, fileURL: url, filePath: path, fileName: file.name }));
                        showToast("Arquivo enviado com sucesso!", "success");
                    }
                );
            };

            const handleSaveDocument = () => {
                if (!selectedSupplier || !docForm.name.trim()) {
                    showToast("Digite o nome do documento.", "error");
                    return;
                }
                if (!docForm.fileURL) {
                    showToast("Aguarde o upload do arquivo PDF terminar (ou anexe um arquivo).", "error");
                    return;
                }

                const docPayload = {
                    id: docForm.id || Date.now().toString(),
                    name: docForm.name.trim(),
                    note: docForm.note || '',
                    issueDate: docForm.issueDate || new Date().toISOString().split('T')[0],
                    expiryDate: docForm.expiryDate || '',
                    fileURL: docForm.fileURL,
                    filePath: docForm.filePath,
                    fileName: docForm.fileName
                };

                const currentDocs = selectedSupplier.documents || [];
                // Cada fornecedor tem sua própria lista livre de documentos: editar atualiza, novo sempre adiciona
                // (permite múltiplos documentos com o mesmo nome, ex: vários laudos por lote)
                let newDocs = docForm.id
                    ? currentDocs.map(d => d.id === docForm.id ? { ...d, ...docPayload } : d)
                    : [...currentDocs, docPayload];

                const updatedSup = { ...selectedSupplier, documents: newDocs };

                window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", String(selectedSupplier.id)), updatedSup)
                    .then(() => {
                        setIsModalOpen(false);
                        setDocForm({ id: null, name: '', note: '', expiryDate: '', fileURL: null, filePath: null, fileName: '', uploading: false, uploadProgress: 0 });
                        showToast("Documento salvo com sucesso!", "success");
                    })
                    .catch((error) => {
                        console.error("Erro ao salvar:", error);
                        showToast("Erro ao salvar o documento.", "error");
                    });
            };

            const confirmDeleteDocument = (docId) => {
                setConfirmDialog({
                    message: "Tem certeza que deseja excluir este documento?",
                    onConfirm: async () => {
                        const currentDocs = selectedSupplier.documents || [];
                        const docToRemove = currentDocs.find(d => d.id === docId);
                        const updatedDocs = currentDocs.filter(d => d.id !== docId);
                        const updatedSup = { ...selectedSupplier, documents: updatedDocs };

                        if (docToRemove && docToRemove.filePath) {
                            try { await window.fb.deleteObject(window.fb.ref(window.fb.storage, docToRemove.filePath)); } catch (e) {}
                        }
                        await window.fb.setDoc(window.fb.doc(window.fb.db, "suppliers", String(selectedSupplier.id)), updatedSup);
                        setConfirmDialog(null);
                        showToast("Documento excluído.", "info");
                    }
                });
            };

            const openDocModal = (existingDoc) => {
                if (existingDoc) {
                    setDocForm({
                        id: existingDoc.id, name: docDisplayName(existingDoc), note: existingDoc.note || '', expiryDate: existingDoc.expiryDate || '',
                        issueDate: existingDoc.issueDate, fileURL: existingDoc.fileURL, filePath: existingDoc.filePath,
                        fileName: existingDoc.fileName, uploading: false, uploadProgress: 0
                    });
                } else {
                    setDocForm({ id: null, name: '', note: '', expiryDate: '', fileURL: null, filePath: null, fileName: '', uploading: false, uploadProgress: 0 });
                }
                setIsModalOpen(true);
            };

            const handleViewDocument = (d) => {
                if (d.fileURL) setViewDocUrl(d.fileURL);
                else showToast("Este documento não possui arquivo digital anexado.", "error");
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const path = `branding/logo_${Date.now()}_${file.name}`;
                const storageRef = window.fb.ref(window.fb.storage, path);
                window.fb.uploadBytesResumable(storageRef, file).on('state_changed', () => {}, (err) => {
                    showToast("Erro ao enviar logo.", "error");
                }, async () => {
                    const url = await window.fb.getDownloadURL(storageRef);
                    setLogoUrl(url);
                    window.fb.setDoc(window.fb.doc(window.fb.db, "settings", "ui"), { brandColor, logoUrl: url }, { merge: true });
                });
            };

            const handleColorChange = (color) => {
                setBrandColor(color);
                window.fb.setDoc(window.fb.doc(window.fb.db, "settings", "ui"), { brandColor: color, logoUrl }, { merge: true });
            };

            const SidebarButton = ({ active, icon: Icon, label, onClick }) => (
                <button
                    onClick={() => { onClick(); setSidebarOpen(false); }}
                    className={`w-full flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-semibold transition-colors border ${active ? 'bg-amber-50 border-amber-200 text-amber-700' : 'border-transparent text-slate-500 hover:bg-slate-50'}`}
                >
                    <Icon size={18} className={active ? 'text-amber-500' : 'text-slate-400'} />
                    {label}
                </button>
            );

            const pageTitle = (view === 'dashboard') ? 'Início'
                : (view === 'list' || view === 'detail') ? 'Fornecedores'
                : (view === 'insumos' || view === 'insumoDetail') ? 'Insumos' : '';

            return (
                <div className="min-h-screen bg-slate-100 relative font-sans text-slate-900 flex">

                    {/* Overlay (mobile) */}
                    {sidebarOpen && <div className="fixed inset-0 bg-black/30 z-30 lg:hidden" onClick={() => setSidebarOpen(false)}></div>}

                    {/* Sidebar */}
                    <aside className={`fixed lg:sticky top-0 left-0 h-screen w-64 bg-white border-r border-slate-100 z-40 flex flex-col flex-shrink-0 transform transition-transform duration-200 lg:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="px-6 py-6 border-b border-slate-100 flex flex-col items-center lg:items-start">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('dashboard'); setListFilter('all'); setSidebarOpen(false); }}>
                                {logoUrl ? <img src={logoUrl} alt="Logo" className="h-9 w-auto object-contain" /> : <div style={{ color: brandColor }}><Icons.ShieldCheck size={28} /></div>}
                                <h1 className="text-xl font-extrabold tracking-tight" style={{ color: brandColor }}>IMAC</h1>
                            </div>
                            <p className="text-[10px] text-slate-400 uppercase tracking-wider font-bold mt-1.5">Qualificação de Fornecedores</p>
                        </div>
                        <nav className="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                            <SidebarButton active={view === 'dashboard'} icon={Icons.Grid} label="Início" onClick={() => { setView('dashboard'); setListFilter('all'); }} />
                            <SidebarButton active={view === 'list' || view === 'detail'} icon={Icons.Users} label="Fornecedores" onClick={() => { setView('list'); setListFilter('all'); }} />
                            <SidebarButton active={view === 'insumos' || view === 'insumoDetail'} icon={Icons.Package} label="Insumos" onClick={() => setView('insumos')} />
                        </nav>
                        <div className="px-3 py-4 border-t border-slate-100">
                            <SidebarButton icon={Icons.Settings} label="Configurações" onClick={() => setShowSettings(true)} />
                        </div>
                    </aside>

                    <div className="flex-1 flex flex-col min-w-0">
                        {/* Top bar */}
                        <header className="bg-white border-b border-slate-100 sticky top-0 z-20 px-4 sm:px-8 h-16 flex items-center gap-3 flex-shrink-0">
                            <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 -ml-2 rounded-lg text-slate-500 hover:bg-slate-100"><Icons.Menu size={22} /></button>
                            <h2 className="text-lg font-bold text-slate-800">{pageTitle}</h2>
                        </header>

                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24">

                        {/* DASHBOARD */}
                        {view === 'dashboard' && (
                            <div className="animate-in">
                                <h2 className="text-2xl font-bold text-slate-800 mb-1">Visão Geral</h2>
                                <p className="text-slate-500 mb-6">Resumo da qualificação de fornecedores</p>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                    <Card title="Total de Fornecedores" value={stats.total} icon={Icons.Users} colorClass="bg-blue-50 text-blue-600" onClick={() => handleDashboardClick('all')} />
                                    <Card title="Qualificados" value={stats.qualified} icon={Icons.CheckCircle} colorClass="bg-green-50 text-green-600" onClick={() => handleDashboardClick('qualified')} />
                                    <Card title="Documentos Vencidos" value={stats.expiredDocs} icon={Icons.AlertTriangle} colorClass="bg-red-50 text-red-600" onClick={() => handleDashboardClick('expired')} />
                                    <Card title="Pendentes / Em Análise" value={stats.pendingReview} icon={Icons.Info} colorClass="bg-yellow-50 text-yellow-600" onClick={() => handleDashboardClick('pending')} />
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
                                        <Icons.AlertTriangle size={18} className="text-orange-500" />
                                        <h3 className="font-bold text-slate-800">Documentos a vencer ou vencidos</h3>
                                    </div>
                                    {urgentItems.length === 0 ? (
                                        <p className="text-center text-sm text-slate-400 py-10">Nenhum documento vencido ou próximo do vencimento. 🎉</p>
                                    ) : (
                                        <div className="divide-y divide-slate-100 max-h-96 overflow-y-auto">
                                            {urgentItems.map((item, idx) => (
                                                <div key={idx} onClick={() => goToSupplier(item.supplierId)} className="px-5 py-3 flex items-center justify-between hover:bg-slate-50 cursor-pointer">
                                                    <div>
                                                        <p className="text-sm font-medium text-slate-800">{item.supplierName}</p>
                                                        <p className="text-xs text-slate-500">{item.docName} • vence {fmtDate(item.expiryDate)}</p>
                                                    </div>
                                                    <StatusBadge status={item.status} />
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* LISTA DE FORNECEDORES */}
                        {view === 'list' && (
                            <div className="animate-in">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                                    <div>
                                        <h2 className="text-2xl font-bold text-slate-800">Fornecedores</h2>
                                        <p className="text-slate-500 text-sm">{filteredSuppliers.length} de {suppliers.length} fornecedores</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <label className="px-4 py-2 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 cursor-pointer flex items-center gap-2">
                                            {isImporting ? <Icons.Loader size={16} /> : <Icons.Upload size={16} />}
                                            Importar planilha
                                            <input type="file" accept=".xlsx,.xls" className="hidden" onChange={handleFileUpload} disabled={isImporting} />
                                        </label>
                                        <button onClick={() => setIsAddSupplierOpen(true)} className="px-4 py-2 rounded-lg text-sm font-medium text-white flex items-center gap-2 shadow-sm" style={{ backgroundColor: brandColor }}>
                                            <Icons.Plus size={16} /> Novo Fornecedor
                                        </button>
                                    </div>
                                </div>

                                <div className="flex flex-col sm:flex-row gap-3 mb-5">
                                    <div className="relative flex-1">

                                        </div>

                                <p className="text-sm text-slate-600 mb-5">{confirmDialog.message}</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 py-2 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancelar</button>
                                    <button onClick={confirmDialog.onConfirm} className="flex-1 py-2 rounded-lg bg-red-500 text-white text-sm font-medium hover:bg-red-600">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast */}
                    {toastInfo && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 animate-slide-up">
                            <div className={`px-4 py-3 rounded-lg shadow-lg text-sm font-medium flex items-center gap-2 ${
                                toastInfo.type === 'success' ? 'bg-green-600 text-white' :
                                toastInfo.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'
                            }`}>
                                {toastInfo.type === 'success' && <Icons.CheckCircle size={16}/>}
                                {toastInfo.type === 'error' && <Icons.AlertTriangle size={16}/>}
                                {toastInfo.message}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
